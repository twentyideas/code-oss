name: Build VS Code Server

on:
  workflow_dispatch:
    inputs:
      vscode_ref:
        description: "VS Code ref to build (tag, branch, or commit). Defaults to the repo's default branch."
        required: false
        default: ""
      platforms:
        description: "Platforms to build (comma-separated). Options: darwin-arm64, win32-x64, linux-x64"
        required: false
        default: "all"
  pull_request:
    types: [labeled]

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
       contains(github.event.pull_request.labels.*.name, 'build-bundle') ||
       contains(github.event.pull_request.labels.*.name, 'build-bundle-darwin') ||
       contains(github.event.pull_request.labels.*.name, 'build-bundle-win32') ||
       contains(github.event.pull_request.labels.*.name, 'build-bundle-linux')))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14-xlarge
            platform: darwin-arm64
            node_arch: arm64
          - os: windows-latest
            platform: win32-x64
            node_arch: x64
          - os: ubuntu-latest
            platform: linux-x64
            node_arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150

    steps:
      - name: Check if platform is selected
        id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          # PR label checks use the if: condition syntax above, so we just
          # need to know which platforms were requested via labels.
          HAS_BUILD_BUNDLE: ${{ contains(github.event.pull_request.labels.*.name, 'build-bundle') }}
          HAS_DARWIN: ${{ contains(github.event.pull_request.labels.*.name, 'build-bundle-darwin') }}
          HAS_WIN32: ${{ contains(github.event.pull_request.labels.*.name, 'build-bundle-win32') }}
          HAS_LINUX: ${{ contains(github.event.pull_request.labels.*.name, 'build-bundle-linux') }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # build-bundle = all platforms
            if [[ "$HAS_BUILD_BUNDLE" == "true" ]]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            elif [[ "$MATRIX_PLATFORM" == "darwin-arm64" && "$HAS_DARWIN" == "true" ]]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            elif [[ "$MATRIX_PLATFORM" == "win32-x64" && "$HAS_WIN32" == "true" ]]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            elif [[ "$MATRIX_PLATFORM" == "linux-x64" && "$HAS_LINUX" == "true" ]]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "Skipping $MATRIX_PLATFORM (no matching build-bundle label)"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          elif [[ "$INPUT_PLATFORMS" == "all" ]] || [[ "$INPUT_PLATFORMS" == *"$MATRIX_PLATFORM"* ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Skipping $MATRIX_PLATFORM (not in: $INPUT_PLATFORMS)"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code-oss
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.vscode_ref || '' }}
          # Full history needed when building from an upstream ref so we can
          # compute and apply fork patches. Shallow clone when building from
          # the default branch (fork patches are already present).
          fetch-depth: ${{ inputs.vscode_ref != '' && 0 || 1 }}

      - name: Apply fork patches
        if: steps.check.outputs.skip != 'true' && inputs.vscode_ref != ''
        shell: bash
        env:
          VSCODE_REF: ${{ inputs.vscode_ref }}
        run: |
          # When building from an upstream ref (e.g. a release tag), our fork
          # customizations aren't present. This step computes the fork delta
          # from the main branch and applies it on top of the upstream ref.
          #
          # How it works:
          # 1. Find the last merge from microsoft/vscode into main
          # 2. Diff that upstream base against main for only fork-modified files
          # 3. Apply the diff with --3way to handle minor context differences
          #
          # Fork-modified files are documented in FORK.md.

          git fetch origin main

          # Find the most recent upstream merge on main
          UPSTREAM_MERGE=$(git log origin/main --merges --grep="microsoft" -1 --format=%H)
          if [ -z "$UPSTREAM_MERGE" ]; then
            echo "::error::Could not find upstream merge commit on main"
            exit 1
          fi

          # The second parent of the merge is the upstream commit
          UPSTREAM_BASE=$(git rev-parse "${UPSTREAM_MERGE}^2")
          echo "Upstream merge commit: $UPSTREAM_MERGE"
          echo "Upstream base: $UPSTREAM_BASE"
          echo "Building ref: $VSCODE_REF"

          # Compute the fork delta: what main changed vs the upstream base,
          # restricted to only files we intentionally modify in our fork.
          FORK_FILES=(
            build/lib/compilation.ts
            src/vs/server/node/webClientServer.ts
            src/vs/platform/actions/common/actions.ts
            src/vs/workbench/services/actions/common/menusExtensionPoint.ts
            src/vs/workbench/browser/parts/titlebar/titlebarPart.ts
            src/vs/workbench/browser/parts/titlebar/media/titlebarpart.css
          )

          git diff "$UPSTREAM_BASE" origin/main -- "${FORK_FILES[@]}" > /tmp/fork-patches.diff

          if [ ! -s /tmp/fork-patches.diff ]; then
            echo "No fork patches to apply"
            exit 0
          fi

          echo "Applying fork patches..."
          git apply --3way /tmp/fork-patches.diff
          echo "✓ Fork patches applied successfully"

      - name: Setup Node.js 22.x
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux build dependencies
        if: steps.check.outputs.skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libkrb5-dev

      - name: Increase swap space (Linux)
        if: steps.check.outputs.skip != 'true' && runner.os == 'Linux'
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 10

      - name: Cache node_modules
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ matrix.platform }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ matrix.node_arch }}
          # Avoid using dlopen to load Kerberos on macOS (matches upstream Azure Pipelines config)
          # https://github.com/mongodb-js/kerberos/commit/04044d2814ad1d01e77f1ce87f26b03d86692cf2
          GYP_DEFINES: "kerberos_use_rtld=false"

      - name: Cache build output
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: out
          key: build-out-${{ matrix.platform }}-${{ hashFiles('src/**') }}
          restore-keys: |
            build-out-${{ matrix.platform }}-

      - name: Build VS Code REH Web server
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: npm run gulp "vscode-reh-web-${{ matrix.platform }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate native module architectures
        if: steps.check.outputs.skip != 'true' && runner.os == 'macOS'
        shell: bash
        run: |
          TARGET_ARCH="${{ matrix.platform }}"
          TARGET_ARCH="${TARGET_ARCH##*-}"

          OUTPUT_DIR="../vscode-reh-web-${{ matrix.platform }}/node_modules"
          FAILED=0

          echo "Checking all .node binaries in $OUTPUT_DIR for $TARGET_ARCH..."
          while IFS= read -r NODE_FILE; do
            FILE_OUTPUT=$(file "$NODE_FILE")
            SHORT_PATH="${NODE_FILE#$OUTPUT_DIR/}"
            if echo "$FILE_OUTPUT" | grep -q "$TARGET_ARCH"; then
              echo "  ✓ $SHORT_PATH"
            else
              echo "::error::Architecture mismatch in $SHORT_PATH! Expected $TARGET_ARCH but got: $FILE_OUTPUT"
              FAILED=1
            fi
          done < <(find "$OUTPUT_DIR" -name "*.node" -type f)

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "All native modules verified for $TARGET_ARCH"

      - name: Patch product.json for Open VSX marketplace
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          OUTPUT_DIR="../vscode-reh-web-${{ matrix.platform }}"
          PRODUCT_JSON="$OUTPUT_DIR/product.json"

          if [ -f "$PRODUCT_JSON" ]; then
            node -e "
          const fs = require('fs');
          const product = JSON.parse(fs.readFileSync('$PRODUCT_JSON', 'utf8'));
          product.extensionsGallery = {
            serviceUrl: 'https://open-vsx.org/vscode/gallery',
            itemUrl: 'https://open-vsx.org/vscode/item',
            resourceUrlTemplate: 'https://open-vsx.org/vscode/unpkg/{publisher}/{name}/{version}/{path}',
            controlUrl: '',
            nlsBaseUrl: '',
            publisherUrl: ''
          };
          fs.writeFileSync('$PRODUCT_JSON', JSON.stringify(product, null, 2));
          "
            echo "Open VSX marketplace configured"
          else
            echo "::warning::product.json not found — extensions marketplace will not work"
          fi

      - name: Create tarball
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          OUTPUT_DIR="../vscode-reh-web-${{ matrix.platform }}"
          TARBALL="vscode-reh-web-${{ matrix.platform }}.tar.gz"

          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "::error::Build output not found at $OUTPUT_DIR"
            exit 1
          fi

          tar -czf "$TARBALL" -C "$(dirname "$OUTPUT_DIR")" "vscode-reh-web-${{ matrix.platform }}"
          echo "Created $TARBALL ($(du -h "$TARBALL" | cut -f1))"

      - name: Upload build artifact
        if: steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vscode-reh-web-${{ matrix.platform }}
          path: vscode-reh-web-${{ matrix.platform }}.tar.gz
          retention-days: 7

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for version detection)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.vscode_ref || '' }}
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Detect VS Code version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=vscode-server-v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected VS Code version: $VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: find artifacts -type f -name "*.tar.gz" | sort

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Collect all tarballs
          TARBALLS=$(find artifacts -type f -name "*.tar.gz")

          if [ -z "$TARBALLS" ]; then
            echo "::error::No tarballs found in artifacts"
            exit 1
          fi

          # Check if release already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — uploading assets with --clobber"
            echo "$TARBALLS" | xargs gh release upload "$TAG" --clobber
          else
            echo "Creating release $TAG"
            NOTES=$(cat <<EOF
          Pre-built VS Code REH Web server for DevSwarm.

          Built from VS Code v$VERSION.
          Platforms: darwin-arm64, win32-x64, linux-x64

          **Usage in DevSwarm:**
          Update vscodeServerVersion in package.json to v$VERSION and run pnpm install.
          EOF
            )
            echo "$TARBALLS" | xargs gh release create "$TAG" \
              --title "VS Code Server v$VERSION" \
              --notes "$NOTES"
          fi

          echo "Release: $TAG"
          gh release view "$TAG"
